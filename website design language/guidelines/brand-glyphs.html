<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-mono);color:var(--ink)}</style></head>
<body>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:20px 16px;text-align:center">
  <div><div style="font-size:26px">→</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta);margin-top:6px">open row</div></div>
  <div><div style="font-size:26px">↗</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta);margin-top:6px">external</div></div>
  <div><div style="font-size:26px">·</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta);margin-top:6px">separator</div></div>
  <div><div style="font-size:26px">—</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta);margin-top:6px">breath</div></div>
  <div><div style="font-size:26px">N°</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta);margin-top:6px">numbering</div></div>
  <div><div style="font-size:26px;color:var(--text-accent)">01</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta);margin-top:6px">index no.</div></div>
</div>
</body></html>
