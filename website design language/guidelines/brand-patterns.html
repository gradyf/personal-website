<!-- @dsCard group="Brand" viewport="700x180" subtitle="Abstract stand-ins for project imagery — one motif per project" name="Specimen Patterns" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-mono);color:var(--ink)}</style></head>
<body>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px">
  <div><div style="height:86px;border:1px solid var(--line);background-color:var(--paper-tile);background-image:var(--pattern-grid)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:7px;color:var(--ink-meta)">grid</div></div>
  <div><div style="height:86px;border:1px solid var(--line);background-color:var(--paper-tile);background-image:var(--pattern-lines)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:7px;color:var(--ink-meta)">lines</div></div>
  <div><div style="height:86px;border:1px solid var(--line);background-color:var(--paper-tint)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:7px;color:var(--ink-meta)">solid</div></div>
  <div><div style="height:86px;border:1px solid var(--line);background-color:var(--paper-tile);background-image:var(--pattern-rings)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:7px;color:var(--ink-meta)">rings</div></div>
  <div><div style="height:86px;border:1px solid var(--line);background-color:var(--paper-tile);background-image:var(--pattern-dots);background-size:var(--pattern-dots-size)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:7px;color:var(--ink-meta)">dots</div></div>
</div>
</body></html>
