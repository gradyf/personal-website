<!-- @dsCard group="Colors" viewport="700x150" subtitle="Hairlines are the architecture — four weights" name="Line System" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-mono);color:var(--ink)}</style></head>
<body>
<div style="display:flex;flex-direction:column;gap:18px;padding:22px 16px">
  <div><div style="border-top:1px solid var(--line-strong)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:6px;color:var(--ink-meta)">--line-strong · section opens/closes, table ends</div></div>
  <div><div style="border-top:1px solid var(--line)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:6px;color:var(--ink-meta)">--line · row dividers, tile frames</div></div>
  <div><div style="border-top:1px solid var(--line-faint)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:6px;color:var(--ink-meta)">--line-faint · in-pattern strokes</div></div>
  <div><div style="border-top:1px solid var(--line-blue)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:6px;color:var(--ink-meta)">--line-blue · dividers on blue chrome</div></div>
</div>
</body></html>
