<!-- @dsCard group="Colors" viewport="700x150" subtitle="The paper family — ground, raised, tile, tint" name="Paper" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-mono);color:var(--ink)}</style></head>
<body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px">
  <div><div style="height:64px;background:var(--paper);border:1px solid var(--line)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:8px">--paper</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta)">#F5F1E6 · page</div></div>
  <div><div style="height:64px;background:var(--paper-raised);border:1px solid var(--line)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:8px">--paper-raised</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta)">#FCFAF3 · hover</div></div>
  <div><div style="height:64px;background:var(--paper-tile);border:1px solid var(--line)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:8px">--paper-tile</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta)">#FAF7EE · tiles</div></div>
  <div><div style="height:64px;background:var(--paper-tint);border:1px solid var(--line)"></div><div style="font-size:10px;font-weight:500;letter-spacing:1px;margin-top:8px">--paper-tint</div><div style="font-size:10px;font-weight:500;color:var(--ink-meta)">#F2EFE4 · recessed</div></div>
</div>
</body></html>
