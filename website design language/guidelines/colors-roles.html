<!-- @dsCard group="Colors" viewport="700x150" subtitle="Where each color is allowed to appear" name="Color Roles" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-sans);color:var(--ink)}</style></head>
<body>
<div style="padding:20px 16px;display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;align-items:baseline;gap:16px">
    <span style="font-size:22px;font-weight:700;letter-spacing:-.4px;color:var(--ink)">Title in ink</span>
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:1px;color:var(--ink-meta)">METADATA · WARM GRAY</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-accent)">accent link ↗</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;background:var(--bg-hover);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 12px">
    <span style="font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text-accent)">01</span>
    <span style="font-size:15px;font-weight:600;color:var(--text-accent)">Hovered row — title flips blue on --bg-hover</span>
    <span style="margin-left:auto;color:var(--text-accent)">→</span>
  </div>
</div>
</body></html>
