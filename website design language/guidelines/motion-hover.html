<!-- @dsCard group="Motion" viewport="700x170" subtitle="Hover = paper lift + blue flip · 0.18s ease-out · hover these" name="Hover & Easing" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--bg-page);font-family:var(--font-sans);color:var(--ink)}
.row{display:grid;grid-template-columns:44px 1fr 36px;align-items:center;gap:16px;padding:14px 8px;border-bottom:1px solid var(--line);color:var(--ink);cursor:pointer;transition:background var(--speed) var(--ease-out),color var(--speed) var(--ease-out)}
.row:hover{background:var(--bg-hover);color:var(--text-accent)}
.lnk{font-family:var(--font-mono);font-size:13px;color:var(--ink);text-decoration:none;transition:color var(--speed-fast) var(--ease-out)}
.lnk:hover{color:var(--text-accent);text-decoration:underline;text-underline-offset:3px}
</style></head>
<body>
<div style="padding:10px 16px 16px">
  <div class="row" style="border-top:1px solid var(--line-strong)">
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-accent)">02</span>
    <span style="font-size:22px;font-weight:700;letter-spacing:-.3px">PID Control</span>
    <span style="font-size:18px;text-align:right">→</span>
  </div>
  <div style="display:flex;gap:24px;padding:16px 8px 0">
    <a class="lnk" href="#">Index.</a><a class="lnk" href="#">About.</a><a class="lnk" href="#">GitHub ↗</a>
    <span style="font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:1px;color:var(--ink-meta);margin-left:auto">NO SCALE, NO SHADOW — COLOR ONLY</span>
  </div>
</div>
</body></html>
