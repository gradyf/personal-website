<!-- @dsCard group="Spacing" viewport="700x190" subtitle="Ledger row grid: 52 / 136 / 1fr / 70 / 36 · square corners, no shadows" name="Row Anatomy" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-page);font-family:var(--font-sans);color:var(--ink)}</style></head>
<body>
<div style="padding:16px 20px">
  <div style="display:grid;grid-template-columns:52px 136px 1fr 70px 36px;gap:20px;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--text-accent);padding-bottom:6px">
    <span>52</span><span>136</span><span>1FR</span><span>70</span><span>36</span>
  </div>
  <div style="display:grid;grid-template-columns:52px 136px 1fr 70px 36px;align-items:center;gap:20px;padding:18px 0;border-top:1px solid var(--line-strong);border-bottom:1px solid var(--line)">
    <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-accent)">01</span>
    <div style="height:86px;border:1px solid var(--line);background-color:var(--paper-tile);background-image:var(--pattern-grid)"></div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <span style="font-size:29px;font-weight:700;letter-spacing:-.4px">Q-Learner</span>
      <span style="font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:1px;color:var(--ink-meta)">REINFORCEMENT LEARNING · PYTHON</span>
    </div>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-meta)">2025</span>
    <span style="font-size:20px;text-align:right">→</span>
  </div>
</div>
</body></html>
